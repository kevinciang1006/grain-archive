<header class="navbar" [class.navbar--scrolled]="scrolled()">
  <div class="navbar__inner">
    <!-- Logo -->
    <a routerLink="/" class="navbar__logo" (click)="closeMenu()">
      <span class="navbar__logo-text">Grain Archive</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="navbar__nav" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact:true}" class="navbar__link">Home</a>
      <a routerLink="/archive" routerLinkActive="is-active" class="navbar__link">Archive</a>
      <a routerLink="/about" routerLinkActive="is-active" class="navbar__link">About</a>
    </nav>

    <!-- Hamburger -->
    <button
      class="navbar__burger"
      [class.is-open]="menuOpen()"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle navigation menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div class="navbar__mobile" role="navigation" aria-label="Mobile navigation">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact:true}" class="navbar__mobile-link" (click)="closeMenu()">Home</a>
      <a routerLink="/archive" routerLinkActive="is-active" class="navbar__mobile-link" (click)="closeMenu()">Archive</a>
      <a routerLink="/about" routerLinkActive="is-active" class="navbar__mobile-link" (click)="closeMenu()">About</a>
    </div>
  }
</header>
