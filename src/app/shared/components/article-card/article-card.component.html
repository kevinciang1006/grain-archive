<article class="card">
  <a [routerLink]="['/archive']" class="card__link" [attr.aria-label]="article().title">
    <img
      [src]="article().imageUrl"
      [alt]="article().imageAlt"
      class="card__image"
      loading="lazy"
    />
    <div class="card__gradient" aria-hidden="true"></div>
    <div class="card__overlay">
      <p class="card__meta">{{ article().category }} · {{ article().date }}</p>
      <h3 class="card__title">{{ article().title }}</h3>
    </div>
  </a>
</article>
