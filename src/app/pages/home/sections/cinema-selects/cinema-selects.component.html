<section class="cinema" aria-label="Cinema Selects">
  <h2 class="cinema__heading">Cinema <br> Selects</h2>

  <div class="cinema__table-wrap">
    <!-- Header labels -->
    <div class="cinema__labels">
      <span class="cinema__label cinema__label--film">Film</span>
      <span class="cinema__label cinema__label--year">Year</span>
      <span class="cinema__label cinema__label--mood cinema__label--hide-mobile">Mood</span>
      <span class="cinema__label cinema__label--why cinema__label--hide-mobile">Why Watch</span>
    </div>

    <!-- Rows -->
    @for (film of films; track film.title) {
      <div class="cinema__row">
        <span class="cinema__cell cinema__cell--film">{{ film.title }}</span>
        <span class="cinema__cell cinema__cell--year">{{ film.year }}</span>
        <span class="cinema__cell cinema__cell--mood cinema__cell--hide-mobile">{{ film.mood }}</span>
        <span class="cinema__cell cinema__cell--why cinema__cell--hide-mobile">{{ film.whyWatch }}</span>
      </div>
    }
  </div>
</section>
