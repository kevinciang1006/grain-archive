<section class="album" aria-label="Featured Album">
  <!-- Background grain texture -->
  <div class="album__grain" aria-hidden="true"></div>

  <!-- "Featured Album" heading — absolute top-left -->
  <h2 class="album__heading" aria-label="Featured Album section">Featured Album</h2>

  <!-- Centered album art + info -->
  <div class="album__content">
    <img
      src="https://images.pexels.com/photos/167092/pexels-photo-167092.jpeg?auto=compress&cs=tinysrgb&w=800"
      alt="False Memory by Artifact — dark textured album artwork"
      class="album__image"
    />
    <div class="album__info">
      <p class="album__name">False Memory by Artifact</p>
      <a href="#" class="album__cta">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <polygon points="10,8 16,12 10,16" fill="currentColor"/>
        </svg>
        Listen now
      </a>
    </div>
  </div>
</section>
